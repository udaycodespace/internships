<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Graphify - CampusEventHub (placeholder)</title>
  <style>body{font-family:system-ui,Segoe UI,Arial,sans-serif;margin:24px}li{margin:8px 0}</style>
</head>
<body>
  <h1>Graphify — CampusEventHub (placeholder)</h1>
  <p>This is a minimal viewer for the placeholder `graph.json` included in this repo. Run the full `graphify` tool to generate an interactive graph.</p>
  <div id="content">Loading graph...</div>

  <script>
    async function load() {
      try {
        const res = await fetch('graph.json');
        const g = await res.json();
        const out = document.getElementById('content');
        const ul = document.createElement('ul');
        g.nodes.forEach(n => {
          const li = document.createElement('li');
          li.textContent = n.label + ' (' + n.id + ')';
          ul.appendChild(li);
        });
        out.innerHTML = '';
        out.appendChild(ul);
        const h = document.createElement('h3'); h.textContent = 'Edges'; out.appendChild(h);
        const ol = document.createElement('ol');
        g.edges.forEach(e => {
          const li = document.createElement('li');
          li.textContent = e.source + ' → ' + e.target + ' — ' + (e.label||'');
          ol.appendChild(li);
        });
        out.appendChild(ol);
      } catch (err) {
        document.getElementById('content').textContent = 'Failed to load graph.json: ' + err;
      }
    }
    load();
  </script>
</body>
</html>
